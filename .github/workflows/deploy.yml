name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build application
        # Only build Phase-1 active apps — Phase 2-7 apps (hr, approval, automation, finance) are
        # not yet deployed and fail without server-side secrets set in CI.
        run: pnpm turbo run build --filter=web... --filter=admin... --filter=@co-at/eval... --filter=@co-at/inventory... --filter=@co-at/stats...
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Resolve Vercel org ID
        id: vercel_org
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          ORG_ID=$(curl -sf -H "Authorization: Bearer $VERCEL_TOKEN" \
            https://api.vercel.com/v2/user | python3 -c "import sys,json; print(json.load(sys.stdin)['user']['id'])")
          echo "VERCEL_ORG_ID=$ORG_ID" >> $GITHUB_ENV
          echo "Resolved VERCEL_ORG_ID: $ORG_ID"

      - name: Deploy web (gwatc.cloud)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: prj_DsC1KW0ZcDVV7v4Y2rcgHoaOrgZu
        run: npx vercel deploy --prod --yes --token="$VERCEL_TOKEN"

      - name: Deploy admin (admin.gwatc.cloud)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: prj_04LbJYRsmFt0CSbvKVtlmTdjYdA4
        run: npx vercel deploy --prod --yes --token="$VERCEL_TOKEN"

      - name: Deploy eval (eval.gwatc.cloud)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: prj_59Kn41eO5ZpmXv61MqVt99Sl7rVk
        run: npx vercel deploy --prod --yes --token="$VERCEL_TOKEN"

      - name: Deploy inventory (inventory.gwatc.cloud)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: prj_VkO6qB20a2eFq2bacH6gr3ZQ89xv
        run: npx vercel deploy --prod --yes --token="$VERCEL_TOKEN"

      - name: Deploy stats (stats.gwatc.cloud)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: prj_gwDFLBEFYDW4jM3ztCsuQRbIpBhu
        run: npx vercel deploy --prod --yes --token="$VERCEL_TOKEN"

      - name: Deploy hr (hr.gwatc.cloud)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: prj_MIa9cyA82b1JYwfKI4j1jjG1kr8a
        run: npx vercel deploy --prod --yes --token="$VERCEL_TOKEN"
