name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      app:
        description: '배포할 앱'
        required: true
        default: 'all'
        type: choice
        options: [all, web, admin, eval, inventory, stats, hr]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

jobs:
  # ── 1. 변경된 앱 감지 (push 이벤트 전용) ─────────────────────────────
  changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      shared:    ${{ steps.filter.outputs.shared }}
      web:       ${{ steps.filter.outputs.web }}
      admin:     ${{ steps.filter.outputs.admin }}
      eval:      ${{ steps.filter.outputs.eval }}
      inventory: ${{ steps.filter.outputs.inventory }}
      stats:     ${{ steps.filter.outputs.stats }}
      hr:        ${{ steps.filter.outputs.hr }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
            web:       ['apps/web/**']
            admin:     ['apps/admin/**']
            eval:      ['apps/eval/**']
            inventory: ['apps/inventory/**']
            stats:     ['apps/stats/**']
            hr:        ['apps/hr/**']

  # ── 2. 앱별 병렬 배포 ────────────────────────────────────────────────
  #   - push:              변경된 앱 + 공유 패키지 변경 시 전체
  #   - workflow_dispatch: 선택한 앱만 (all 선택 시 전체)
  #
  #   로컬 빌드 없음 — Vercel이 자체 빌드 수행
  # ──────────────────────────────────────────────────────────────────────

  deploy-web:
    name: "Deploy: web (gwatc.cloud)"
    needs: changes
    if: |
      always() && !failure() && !cancelled() && (
        (github.event_name == 'workflow_dispatch' &&
          (github.event.inputs.app == 'all' || github.event.inputs.app == 'web')) ||
        (github.event_name == 'push' &&
          (needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true'))
      )
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: prj_DsC1KW0ZcDVV7v4Y2rcgHoaOrgZu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Deploy to Vercel
        run: npx vercel deploy --prod --yes --token="$VERCEL_TOKEN"

  deploy-admin:
    name: "Deploy: admin (admin.gwatc.cloud)"
    needs: changes
    if: |
      always() && !failure() && !cancelled() && (
        (github.event_name == 'workflow_dispatch' &&
          (github.event.inputs.app == 'all' || github.event.inputs.app == 'admin')) ||
        (github.event_name == 'push' &&
          (needs.changes.outputs.admin == 'true' || needs.changes.outputs.shared == 'true'))
      )
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: prj_04LbJYRsmFt0CSbvKVtlmTdjYdA4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
