        (github.event_name == 'push' &&
          (needs.changes.outputs.stats == 'true' || needs.changes.outputs.shared == 'true'))
      )
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: prj_gwDFLBEFYDW4jM3ztCsuQRbIpBhu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
